<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Кабинет следователя</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --panel-bg: rgba(255, 255, 255, 0.96);
      --panel-border: rgba(15, 23, 42, 0.08);
      --panel-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
      --surface-text: #101828;
      --surface-muted: #667085;
      --muted: #667085;
      --accent: #4d88d1;
      --badge-bg: #e1f2f4;
      --badge-text: #4d8a91;
      --bg: #eef4fb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 12px 12px calc(18px + env(safe-area-inset-bottom));
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(180deg, rgba(118, 170, 233, 0.18), rgba(255, 255, 255, 0) 180px),
        var(--bg);
      color: var(--tg-theme-text-color, #101828);
    }

    .shell {
      width: min(100%, 420px);
      margin: 0 auto;
      min-height: calc(100vh - 12px - (18px + env(safe-area-inset-bottom)));
      display: flex;
      flex-direction: column;
    }

    .topbar {
      margin-bottom: 12px;
      padding: 0 4px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
    }

    .content {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
    }

    .card {
      background: var(--panel-bg);
      color: var(--surface-text);
      border: 1px solid var(--panel-border);
      box-shadow: var(--panel-shadow);
      border-radius: 18px;
      padding: 14px 14px 12px;
      backdrop-filter: blur(8px);
      margin-bottom: 10px;
    }

    .profile-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 800;
    }

    .profile-lines {
      margin: 0;
      padding: 0;
      list-style: none;
      font-size: 13px;
      line-height: 1.4;
    }

    .profile-lines li + li {
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 11px;
      line-height: 1;
      font-weight: 600;
    }

    .primary-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(180deg, #5a96e1, #3f78bf);
      color: #fff;
      padding: 11px 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .menu-card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      padding: 13px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.96);
      color: var(--surface-text);
      border: 1px solid var(--panel-border);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      margin-bottom: 8px;
    }

    .menu-icon {
      width: 22px;
      height: 22px;
      border-radius: 8px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #475467;
      background: #fff;
      flex: 0 0 auto;
    }

    .menu-icon svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .menu-text {
      font-size: 14px;
      line-height: 1.25;
    }

    .menu-text small {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .bottom-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 8px 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--surface-muted);
      border: 1px solid var(--panel-border);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.10);
      margin-top: auto;
      font-size: 11px;
      text-align: center;
    }

    .bottom-tabs span.is-active {
      color: #101828;
      font-weight: 600;
    }

    .status {
      min-height: 18px;
      margin: 8px 2px 0;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">Кабинет следователя</div>

    <div class="content">
      <div class="card">
        <h1 class="profile-title">Профиль следователя</h1>
        <ul class="profile-lines">
          <li id="profilePosition">Должность</li>
          <li id="profileUnit">Подразделение</li>
          <li id="profileRank">Звание</li>
          <li id="profileName">ФИО</li>
        </ul>
        <div class="badge">Синхронизировано с ботом</div>
        <button class="primary-btn" id="editProfileBtn" type="button">Редактировать профиль</button>
      </div>

      <div class="menu-card">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3 19 7v10l-7 4-7-4V7l7-4Z"></path>
            <path d="M5 7l7 4 7-4"></path>
            <path d="M12 11v10"></path>
          </svg>
        </div>
        <div class="menu-text">Обучение<small>IP, DNS, BIN, телефоны, криптокошельки</small></div>
      </div>
      <div class="menu-card">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4H20v15.5A1.5 1.5 0 0 0 18.5 18H6.5A2.5 2.5 0 0 0 4 20.5z"></path>
            <path d="M6.5 4C5.12 4 4 5.12 4 6.5V20.5C4 19.12 5.12 18 6.5 18H20"></path>
            <path d="M9 8h6"></path>
          </svg>
        </div>
        <div class="menu-text">Методические материалы</div>
      </div>
      <div class="menu-card">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M16 20H8a4 4 0 0 1 8 0Z"></path>
            <circle cx="12" cy="9" r="3"></circle>
          </svg>
        </div>
        <div class="menu-text">Мои данные</div>
      </div>
      <div class="menu-card">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l7 3v6c0 4.5-2.7 7.8-7 9-4.3-1.2-7-4.5-7-9V6l7-3Z"></path>
          </svg>
        </div>
        <div class="menu-text">Политика ПД</div>
      </div>
      <div class="menu-card">
        <div class="menu-icon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9"></circle>
            <path d="M12 10v5"></path>
            <path d="M12 7.5h.01"></path>
          </svg>
        </div>
        <div class="menu-text">Что нового</div>
      </div>

      <div class="bottom-tabs">
        <span class="is-active">Открыть профиль</span>
        <span>Пройти модуль</span>
        <span>Мои данные</span>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const statusEl = document.getElementById("status");
    const editProfileBtn = document.getElementById("editProfileBtn");

    function profileApiUrl() {
      return window.location.origin + "/api/webapp-profile/";
    }

    function profileEditUrl() {
      return window.location.origin + "/webapp/cabinet/";
    }

    function setStatus(text, isError) {
      statusEl.textContent = text || "";
      statusEl.style.color = isError ? "#b42318" : "";
    }

    function fillProfile(profile) {
      const data = profile || {};
      document.getElementById("profilePosition").textContent = data.position || "Должность";
      document.getElementById("profileUnit").textContent = data.unit || "Подразделение";
      document.getElementById("profileRank").textContent = data.rank || "Звание";
      document.getElementById("profileName").textContent = data.signature_name || "ФИО";
    }

    async function loadDashboard() {
      if (!tg.initData) {
        setStatus("Ошибка: нет данных Telegram. Откройте мини-приложение из бота.", true);
        return;
      }
      setStatus("Загрузка кабинета...", false);
      try {
        const response = await fetch(profileApiUrl(), {
          headers: {
            "X-Telegram-Init-Data": tg.initData
          }
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus((data && data.error) ? data.error : "Не удалось загрузить кабинет.", true);
          return;
        }
        fillProfile(data.profile);
        setStatus("", false);
      } catch (error) {
        setStatus("Ошибка сети при загрузке кабинета.", true);
      }
    }

    editProfileBtn.addEventListener("click", () => {
      window.location.href = profileEditUrl();
    });

    loadDashboard();
  </script>
</body>
</html>
