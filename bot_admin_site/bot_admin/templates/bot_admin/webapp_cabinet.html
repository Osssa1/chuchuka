<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Профиль следователя</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --panel-bg: rgba(255, 255, 255, 0.96);
      --panel-border: rgba(15, 23, 42, 0.08);
      --panel-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
      --muted: #667085;
      --accent: #63c766;
      --disabled: #dbe2ea;
      --disabled-text: #a0aab6;
      --input-border: #d9dee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 14px 26px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(180deg, rgba(118, 170, 233, 0.18), rgba(255, 255, 255, 0) 180px),
        var(--tg-theme-secondary-bg-color, #eef4fb);
      color: var(--tg-theme-text-color, #101828);
    }

    .shell {
      width: min(100%, 346px);
      margin: 0 auto;
    }

    .panel {
      border-radius: 22px;
      padding: 18px 16px 14px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .account-badge {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(99, 199, 102, 0.12);
      font-size: 12px;
      color: #267a32;
    }

    .account-badge.is-muted {
      background: rgba(102, 112, 133, 0.1);
      color: var(--muted);
    }

    .fields {
      display: grid;
      gap: 10px;
    }

    .field {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: var(--tg-theme-text-color, #111827);
      font-size: 15px;
      outline: none;
    }

    .field::placeholder {
      color: #98a2b3;
    }

    .picker-btn {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: var(--tg-theme-text-color, #111827);
      font-size: 15px;
      text-align: left;
      cursor: pointer;
      position: relative;
    }

    .picker-btn.is-empty {
      color: #98a2b3;
    }

    .picker-btn::after {
      content: ">";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #98a2b3;
      font-size: 12px;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #72d36f, #46b753);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .btn:disabled {
      background: var(--disabled);
      color: var(--disabled-text);
      box-shadow: none;
      cursor: not-allowed;
    }

    .msg {
      min-height: 18px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .msg.err {
      color: #b42318;
    }

    .picker-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      background: rgba(15, 23, 42, 0.35);
      z-index: 20;
    }

    .picker-overlay.is-open {
      display: flex;
    }

    .picker-sheet {
      width: min(100%, 360px);
      max-height: min(70vh, 520px);
      background: rgba(255, 255, 255, 0.98);
      border-radius: 20px 20px 14px 14px;
      border: 1px solid var(--panel-border);
      box-shadow: var(--panel-shadow);
      overflow: hidden;
    }

    .picker-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
    }

    .picker-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }

    .picker-close {
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
    }

    .picker-list {
      padding: 10px 10px 12px;
      overflow-y: auto;
      max-height: min(58vh, 430px);
    }

    .picker-option {
      display: block;
      width: 100%;
      padding: 12px 12px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      background: #fff;
      text-align: left;
      font-size: 14px;
      cursor: pointer;
    }

    .picker-option + .picker-option {
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <h1>Профиль следователя</h1>

      <div class="account-badge is-muted" id="accountBadge">Загрузка данных профиля...</div>

      <div class="fields">
        <button class="picker-btn is-empty" id="positionBtn" type="button">Должность</button>
        <button class="picker-btn is-empty" id="unitBtn" type="button">Подразделение</button>
        <button class="picker-btn is-empty" id="rankBtn" type="button">Звание</button>
        <input class="field" id="signatureName" maxlength="255" placeholder="И.И.Иванов">
      </div>

      <button class="btn btn-primary" id="btnSave" disabled>Продолжить</button>

      <div class="msg" id="status"></div>
    </div>

    <div class="meta" id="metaText">Продолжить неактивна, пока не дано согласие.</div>
  </div>

  <div class="picker-overlay" id="pickerOverlay">
    <div class="picker-sheet">
      <div class="picker-head">
        <h2 class="picker-title" id="pickerTitle">Выберите значение</h2>
        <button class="picker-close" id="pickerClose" type="button">x</button>
      </div>
      <div class="picker-list" id="pickerList"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const POSITION_OPTIONS = [
      "Следователь",
      "Старший следователь",
      "Следователь по особо важным делам",
      "Старший следователь по особо важным делам",
      "Оперуполномоченный",
      "Старший оперуполномоченный",
      "Инспектор",
      "Старший инспектор",
      "Начальник отдела",
      "Заместитель начальника отдела"
    ];

    const UNIT_OPTIONS = [
      "Следственный отдел",
      "Отдел уголовного розыска",
      "Отдел аналитики",
      "Отдел информационного обеспечения",
      "Отдел оперативного сопровождения",
      "Управление внутренних дел",
      "Управление по борьбе с киберпреступностью",
      "Главное следственное управление",
      "Районный отдел внутренних дел",
      "Межрайонный отдел"
    ];

    const RANK_OPTIONS = [
      "Без звания",
      "Лейтенант",
      "Старший лейтенант",
      "Капитан",
      "Майор",
      "Подполковник",
      "Полковник"
    ];

    const statusEl = document.getElementById("status");
    const btnSave = document.getElementById("btnSave");
    const badgeEl = document.getElementById("accountBadge");
    const metaEl = document.getElementById("metaText");
    const positionBtn = document.getElementById("positionBtn");
    const unitBtn = document.getElementById("unitBtn");
    const rankBtn = document.getElementById("rankBtn");
    const pickerOverlay = document.getElementById("pickerOverlay");
    const pickerTitle = document.getElementById("pickerTitle");
    const pickerList = document.getElementById("pickerList");
    const pickerClose = document.getElementById("pickerClose");
    let accountState = null;
    let activePicker = null;

    function apiUrl() {
      return window.location.origin + "/api/webapp-profile/";
    }

    function setStatus(text, isError) {
      statusEl.textContent = text || "";
      statusEl.className = isError ? "msg err" : "msg";
    }

    function fmtDate(value) {
      if (!value) {
        return "";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleDateString("ru-RU");
    }

    function canProceed() {
      return Boolean(accountState && accountState.consent_at);
    }

    function updateButtonState() {
      btnSave.disabled = !canProceed();
      if (canProceed()) {
        metaEl.textContent = "Профиль хранится в админке Django и будет подставляться в справки после сохранения.";
      } else {
        metaEl.textContent = "Продолжить неактивна, пока не дано согласие.";
      }
    }

    function setPickerValue(button, value, emptyLabel) {
      button.dataset.value = value || "";
      button.textContent = value || emptyLabel;
      button.classList.toggle("is-empty", !value);
    }

    function openPicker(type, title, options, button, emptyLabel) {
      activePicker = { button, emptyLabel };
      pickerTitle.textContent = title;
      pickerList.innerHTML = options.map((option) => (
        '<button class="picker-option" type="button" data-value="' +
        option.replace(/"/g, "&quot;") +
        '">' + option + "</button>"
      )).join("");
      pickerOverlay.classList.add("is-open");
      pickerList.querySelectorAll(".picker-option").forEach((item) => {
        item.addEventListener("click", () => {
          setPickerValue(button, item.dataset.value || "", emptyLabel);
          closePicker();
        });
      });
    }

    function closePicker() {
      pickerOverlay.classList.remove("is-open");
      activePicker = null;
    }

    function fillAccount(account) {
      accountState = account || {};
      const name = account.fio || account.telegram_username || "Пользователь";
      if (account.consent_at) {
        badgeEl.textContent = name + ". Согласие получено " + fmtDate(account.consent_at) + ".";
        badgeEl.className = "account-badge";
      } else {
        badgeEl.textContent = name + ". Для продолжения сначала нужно дать согласие на обработку персональных данных.";
        badgeEl.className = "account-badge is-muted";
      }
      updateButtonState();
    }

    function fillProfile(profile) {
      const data = profile || {};
      setPickerValue(positionBtn, data.position || "", "Должность");
      setPickerValue(unitBtn, data.unit || "", "Подразделение");
      setPickerValue(rankBtn, data.rank || "", "Звание");
      document.getElementById("signatureName").value = data.signature_name || "";
    }

    async function loadProfile() {
      if (!tg.initData) {
        setStatus("Ошибка: нет данных Telegram. Откройте мини-приложение из бота.", true);
        return;
      }
      setStatus("Загрузка данных...", false);
      try {
        const response = await fetch(apiUrl(), {
          headers: {
            "X-Telegram-Init-Data": tg.initData
          }
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus((data && data.error) ? data.error : "Не удалось загрузить кабинет.", true);
          return;
        }
        fillAccount(data.account || {});
        fillProfile(data.profile);
        setStatus("", false);
      } catch (error) {
        setStatus("Ошибка сети при загрузке данных.", true);
      }
    }

    btnSave.addEventListener("click", async () => {
      if (!tg.initData) {
        setStatus("Ошибка: нет данных Telegram. Откройте мини-приложение из бота.", true);
        return;
      }
      if (!canProceed()) {
        setStatus("Сначала необходимо дать согласие на обработку персональных данных.", true);
        return;
      }
      btnSave.disabled = true;
      setStatus("Сохраняю профиль...", false);
      try {
        const response = await fetch(apiUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            init_data: tg.initData,
            position: positionBtn.dataset.value || "",
            unit: unitBtn.dataset.value || "",
            rank: rankBtn.dataset.value || "",
            signature_name: document.getElementById("signatureName").value
          })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus((data && data.error) ? data.error : "Не удалось сохранить профиль.", true);
          updateButtonState();
          return;
        }
        fillAccount(data.account || {});
        fillProfile(data.profile);
        setStatus("Профиль сохранен. Можно продолжить работу в боте.", false);
      } catch (error) {
        setStatus("Ошибка сети при сохранении профиля.", true);
      }
      updateButtonState();
    });

    positionBtn.addEventListener("click", () => {
      openPicker("position", "Выберите должность", POSITION_OPTIONS, positionBtn, "Должность");
    });

    unitBtn.addEventListener("click", () => {
      openPicker("unit", "Выберите подразделение", UNIT_OPTIONS, unitBtn, "Подразделение");
    });

    rankBtn.addEventListener("click", () => {
      openPicker("rank", "Выберите звание", RANK_OPTIONS, rankBtn, "Звание");
    });

    pickerClose.addEventListener("click", closePicker);
    pickerOverlay.addEventListener("click", (event) => {
      if (event.target === pickerOverlay) {
        closePicker();
      }
    });

    loadProfile();
  </script>
</body>
</html>
