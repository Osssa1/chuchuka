<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Профиль следователя</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --panel-bg: rgba(255, 255, 255, 0.96);
      --panel-border: rgba(15, 23, 42, 0.08);
      --panel-shadow: 0 18px 42px rgba(15, 23, 42, 0.16);
      --muted: #667085;
      --accent: #63c766;
      --disabled: #dbe2ea;
      --disabled-text: #a0aab6;
      --input-border: #d9dee7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px 14px 26px;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        linear-gradient(180deg, rgba(118, 170, 233, 0.18), rgba(255, 255, 255, 0) 180px),
        var(--tg-theme-secondary-bg-color, #eef4fb);
      color: var(--tg-theme-text-color, #101828);
    }

    .shell {
      width: min(100%, 346px);
      margin: 0 auto;
    }

    .panel {
      border-radius: 22px;
      padding: 18px 16px 14px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      box-shadow: var(--panel-shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.2;
      font-weight: 800;
    }

    .account-badge {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(99, 199, 102, 0.12);
      font-size: 12px;
      color: #267a32;
    }

    .account-badge.is-muted {
      background: rgba(102, 112, 133, 0.1);
      color: var(--muted);
    }

    .fields {
      display: grid;
      gap: 10px;
    }

    .field {
      width: 100%;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      padding: 11px 12px;
      background: #fff;
      color: var(--tg-theme-text-color, #111827);
      font-size: 15px;
      outline: none;
    }

    .field::placeholder {
      color: #98a2b3;
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
    }

    .btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
      line-height: 1.1;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }

    .btn-primary {
      background: linear-gradient(180deg, #72d36f, #46b753);
      color: #fff;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .btn:disabled {
      background: var(--disabled);
      color: var(--disabled-text);
      box-shadow: none;
      cursor: not-allowed;
    }

    .msg {
      min-height: 18px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .msg.err {
      color: #b42318;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="panel">
      <h1>Профиль следователя</h1>

      <div class="account-badge is-muted" id="accountBadge">Загрузка данных профиля...</div>

      <div class="fields">
        <input class="field" id="position" maxlength="255" placeholder="Должность">
        <input class="field" id="unit" maxlength="255" placeholder="Подразделение">
        <input class="field" id="rank" maxlength="255" placeholder="Звание">
        <input class="field" id="signatureName" maxlength="255" placeholder="ФИО">
      </div>

      <button class="btn btn-primary" id="btnSave" disabled>Продолжить</button>

      <div class="msg" id="status"></div>
    </div>

    <div class="meta" id="metaText">Продолжить неактивна, пока не дано согласие.</div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const statusEl = document.getElementById("status");
    const btnSave = document.getElementById("btnSave");
    const badgeEl = document.getElementById("accountBadge");
    const metaEl = document.getElementById("metaText");
    let accountState = null;

    function apiUrl() {
      return window.location.origin + "/api/webapp-profile/";
    }

    function setStatus(text, isError) {
      statusEl.textContent = text || "";
      statusEl.className = isError ? "msg err" : "msg";
    }

    function fmtDate(value) {
      if (!value) {
        return "";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleDateString("ru-RU");
    }

    function canProceed() {
      return Boolean(accountState && accountState.consent_at);
    }

    function updateButtonState() {
      btnSave.disabled = !canProceed();
      if (canProceed()) {
        metaEl.textContent = "Профиль хранится в админке Django и будет подставляться в справки после сохранения.";
      } else {
        metaEl.textContent = "Продолжить неактивна, пока не дано согласие.";
      }
    }

    function fillAccount(account) {
      accountState = account || {};
      const name = account.fio || account.telegram_username || "Пользователь";
      if (account.consent_at) {
        badgeEl.textContent = name + ". Согласие получено " + fmtDate(account.consent_at) + ".";
        badgeEl.className = "account-badge";
      } else {
        badgeEl.textContent = name + ". Для продолжения сначала нужно дать согласие на обработку персональных данных.";
        badgeEl.className = "account-badge is-muted";
      }
      updateButtonState();
    }

    function fillProfile(profile) {
      const data = profile || {};
      document.getElementById("position").value = data.position || "";
      document.getElementById("unit").value = data.unit || "";
      document.getElementById("rank").value = data.rank || "";
      document.getElementById("signatureName").value = data.signature_name || "";
    }

    async function loadProfile() {
      if (!tg.initData) {
        setStatus("Ошибка: нет данных Telegram. Откройте мини-приложение из бота.", true);
        return;
      }
      setStatus("Загрузка данных...", false);
      try {
        const response = await fetch(apiUrl(), {
          headers: {
            "X-Telegram-Init-Data": tg.initData
          }
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus((data && data.error) ? data.error : "Не удалось загрузить кабинет.", true);
          return;
        }
        fillAccount(data.account || {});
        fillProfile(data.profile);
        setStatus("", false);
      } catch (error) {
        setStatus("Ошибка сети при загрузке данных.", true);
      }
    }

    btnSave.addEventListener("click", async () => {
      if (!tg.initData) {
        setStatus("Ошибка: нет данных Telegram. Откройте мини-приложение из бота.", true);
        return;
      }
      if (!canProceed()) {
        setStatus("Сначала необходимо дать согласие на обработку персональных данных.", true);
        return;
      }
      btnSave.disabled = true;
      setStatus("Сохраняю профиль...", false);
      try {
        const response = await fetch(apiUrl(), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            init_data: tg.initData,
            position: document.getElementById("position").value,
            unit: document.getElementById("unit").value,
            rank: document.getElementById("rank").value,
            signature_name: document.getElementById("signatureName").value
          })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          setStatus((data && data.error) ? data.error : "Не удалось сохранить профиль.", true);
          updateButtonState();
          return;
        }
        fillAccount(data.account || {});
        fillProfile(data.profile);
        setStatus("Профиль сохранен. Можно продолжить работу в боте.", false);
      } catch (error) {
        setStatus("Ошибка сети при сохранении профиля.", true);
      }
      updateButtonState();
    });

    loadProfile();
  </script>
</body>
</html>
